<!-- Purpose: Provides the combined student and faculty authentication interface with faculty default. -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Faculty Login | Student Portfolio Platform</title>
    <link rel="stylesheet" href="/frontend/css/style.css" />
  </head>
  <body class="auth-body" data-auth-default="faculty">
    <button class="theme-fab theme-icon-button" type="button" data-theme-toggle aria-label="Switch theme">
      <span class="theme-icon theme-icon-sun" aria-hidden="true">
        <svg viewBox="0 0 24 24" focusable="false">
          <path
            d="M12 5.75a.75.75 0 0 1 .75.75v1.19a.75.75 0 0 1-1.5 0V6.5a.75.75 0 0 1 .75-.75Zm0 10.56a.75.75 0 0 1 .75.75v1.19a.75.75 0 0 1-1.5 0v-1.19a.75.75 0 0 1 .75-.75Zm6.25-4.31a.75.75 0 0 1 .75.75.75.75 0 0 1-.75.75h-1.19a.75.75 0 0 1 0-1.5h1.19ZM7.69 12a.75.75 0 0 1-.75.75H5.75a.75.75 0 0 1 0-1.5h1.19a.75.75 0 0 1 .75.75Zm7.04-4.29.84-.84a.75.75 0 1 1 1.06 1.06l-.84.84a.75.75 0 0 1-1.06-1.06Zm-7.46 7.46.84-.84a.75.75 0 0 1 1.06 1.06l-.84.84a.75.75 0 0 1-1.06-1.06Zm8.52-.84.84.84a.75.75 0 0 1-1.06 1.06l-.84-.84a.75.75 0 1 1 1.06-1.06Zm-7.46-7.46.84.84A.75.75 0 0 1 8.11 8.77l-.84-.84a.75.75 0 0 1 1.06-1.06ZM12 8.75A3.25 3.25 0 1 1 8.75 12 3.25 3.25 0 0 1 12 8.75Zm0 1.5A1.75 1.75 0 1 0 13.75 12 1.75 1.75 0 0 0 12 10.25Z"
          />
        </svg>
      </span>
      <span class="theme-icon theme-icon-moon" aria-hidden="true">
        <svg viewBox="0 0 24 24" focusable="false">
          <path
            d="M14.72 3.78a.75.75 0 0 1 .83.97 6.75 6.75 0 1 0 8.7 8.7.75.75 0 0 1 .97.83 8.25 8.25 0 1 1-10.5-10.5Z"
          />
        </svg>
      </span>
    </button>

    <main class="auth-shell auth-shell-split auth-shell-unified">
      <section class="auth-showcase auth-showcase-unified">
        <div class="showcase-grid"></div>
        <div class="showcase-content">
          <p id="auth-eyebrow" class="eyebrow">Faculty Access</p>
          <h1 id="auth-hero-title">Faculty Review Portal</h1>
          <p id="auth-hero-copy" class="hero-copy">
            Use your faculty credentials to continue.
          </p>
          <div class="minimal-illustration" aria-hidden="true">
            <span class="minimal-orb"></span>
            <span class="minimal-line"></span>
            <span class="minimal-line minimal-line-short"></span>
          </div>
        </div>
      </section>

      <section class="auth-panel auth-panel-minimal auth-panel-unified">
        <div class="auth-panel-inner auth-panel-inner-minimal auth-panel-inner-unified">
          <div class="auth-brand">
            <span id="auth-brand-badge" class="brand-badge">FR</span>
            <div>
              <p id="auth-kicker" class="auth-kicker">Faculty Access</p>
              <h2>EduPort</h2>
            </div>
          </div>

          <div class="role-switch" role="tablist" aria-label="Portal roles">
            <button type="button" class="role-option" data-role-switch="student">Student</button>
            <button type="button" class="role-option active" data-role-switch="faculty">Faculty</button>
          </div>

          <div class="auth-intro">
            <h3 id="auth-title">Faculty Portal</h3>
            <p id="auth-subtitle">Use your faculty credentials to sign in.</p>
          </div>

          <div id="auth-message" class="message" aria-live="polite"></div>

          <form id="login-form" class="auth-form">
            <label class="field">
              <span id="auth-email-label">Faculty Email</span>
              <div class="input-shell">
                <span class="input-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" focusable="false">
                    <path
                      d="M4 6.75h16A1.25 1.25 0 0 1 21.25 8v8A1.25 1.25 0 0 1 20 17.25H4A1.25 1.25 0 0 1 2.75 16V8A1.25 1.25 0 0 1 4 6.75Zm0 1.5a.2.2 0 0 0-.2.2v.14l8.2 5.25 8.2-5.25v-.14a.2.2 0 0 0-.2-.2H4Zm16 7.5a.2.2 0 0 0 .2-.2v-5.18l-7.53 4.82a1.25 1.25 0 0 1-1.34 0L3.8 10.37v5.18a.2.2 0 0 0 .2.2h16Z"
                    />
                  </svg>
                </span>
                <input id="auth-email-input" type="email" name="email" placeholder="teacher@example.edu" required />
              </div>
            </label>

            <label class="field">
              <span id="auth-password-label">Password</span>
              <div class="input-shell">
                <span class="input-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" focusable="false">
                    <path
                      d="M7.75 10V8.75a4.25 4.25 0 1 1 8.5 0V10h.75A2.25 2.25 0 0 1 19.25 12.25v6.5A2.25 2.25 0 0 1 17 21H7a2.25 2.25 0 0 1-2.25-2.25v-6.5A2.25 2.25 0 0 1 7 10h.75Zm1.5 0h5.5V8.75a2.75 2.75 0 0 0-5.5 0V10Zm-2.25 1.5a.75.75 0 0 0-.75.75v6.5c0 .414.336.75.75.75h10a.75.75 0 0 0 .75-.75v-6.5a.75.75 0 0 0-.75-.75H7Zm5 1.75a1.75 1.75 0 0 1 1 3.186V18a.75.75 0 0 1-1.5 0v-1.564a1.75 1.75 0 0 1 .5-3.436Z"
                    />
                  </svg>
                </span>
                <input
                  id="auth-password-input"
                  type="password"
                  name="password"
                  placeholder="Enter password"
                  required
                  data-password-input
                />
                <button
                  class="toggle-visibility"
                  type="button"
                  data-password-toggle
                  aria-label="Show password"
                >
                  Show
                </button>
              </div>
            </label>

            <button id="auth-submit-label" type="submit" class="primary-button auth-submit">Sign In as Faculty</button>

            <p id="auth-student-switch" class="auth-switch hidden">
              New here?
              <button type="button" class="text-button" data-auth-switch="register">Create account</button>
            </p>
          </form>

          <form id="register-form" class="auth-form hidden">
            <label class="field">
              <span>Name</span>
              <div class="input-shell">
                <span class="input-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" focusable="false">
                    <path
                      d="M12 12.25a4.125 4.125 0 1 0 0-8.25 4.125 4.125 0 0 0 0 8.25Zm0 1.5c-4.555 0-8.25 2.742-8.25 6.125 0 .621.504 1.125 1.125 1.125h14.25c.621 0 1.125-.504 1.125-1.125 0-3.383-3.695-6.125-8.25-6.125Z"
                    />
                  </svg>
                </span>
                <input type="text" name="name" placeholder="Your full name" required minlength="2" />
              </div>
            </label>

            <label class="field">
              <span>Student Email</span>
              <div class="input-shell">
                <span class="input-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" focusable="false">
                    <path
                      d="M4 6.75h16A1.25 1.25 0 0 1 21.25 8v8A1.25 1.25 0 0 1 20 17.25H4A1.25 1.25 0 0 1 2.75 16V8A1.25 1.25 0 0 1 4 6.75Zm0 1.5a.2.2 0 0 0-.2.2v.14l8.2 5.25 8.2-5.25v-.14a.2.2 0 0 0-.2-.2H4Zm16 7.5a.2.2 0 0 0 .2-.2v-5.18l-7.53 4.82a1.25 1.25 0 0 1-1.34 0L3.8 10.37v5.18a.2.2 0 0 0 .2.2h16Z"
                    />
                  </svg>
                </span>
                <input type="email" name="email" placeholder="student@example.com" required />
              </div>
            </label>

            <label class="field">
              <span>Password</span>
              <div class="input-shell">
                <span class="input-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" focusable="false">
                    <path
                      d="M7.75 10V8.75a4.25 4.25 0 1 1 8.5 0V10h.75A2.25 2.25 0 0 1 19.25 12.25v6.5A2.25 2.25 0 0 1 17 21H7a2.25 2.25 0 0 1-2.25-2.25v-6.5A2.25 2.25 0 0 1 7 10h.75Zm1.5 0h5.5V8.75a2.75 2.75 0 0 0-5.5 0V10Zm-2.25 1.5a.75.75 0 0 0-.75.75v6.5c0 .414.336.75.75.75h10a.75.75 0 0 0 .75-.75v-6.5a.75.75 0 0 0-.75-.75H7Zm5 1.75a1.75 1.75 0 0 1 1 3.186V18a.75.75 0 0 1-1.5 0v-1.564a1.75 1.75 0 0 1 .5-3.436Z"
                    />
                  </svg>
                </span>
                <input
                  type="password"
                  name="password"
                  placeholder="Create a password"
                  required
                  minlength="6"
                  data-password-input
                />
                <button
                  class="toggle-visibility"
                  type="button"
                  data-password-toggle
                  aria-label="Show password"
                >
                  Show
                </button>
              </div>
            </label>

            <button id="auth-register-label" type="submit" class="primary-button auth-submit">Create Student Account</button>

            <p class="auth-switch">
              Already have an account?
              <button type="button" class="text-button" data-auth-switch="login">Login</button>
            </p>
          </form>

          <p class="auth-footnote">Built with purpose · <span>EduPort</span> Platform</p>
        </div>
      </section>
    </main>

    <script src="js/theme.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
  </body>
</html>
